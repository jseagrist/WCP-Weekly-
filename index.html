<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WCP Weekly · Volume 1 · Issue 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600;1,8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
/* WCP Weekly Newsletter — styles
   Inspired by Onest (data-driven, candlestick green/red) but tuned for editorial email.
   Default: warm-cream light theme. Tweakable: dark, accent.
*/

:root {
  /* base palette */
  --ink: #0A0D11;
  --ink-2: #1A1F26;
  --paper: #F7F5EF;            /* warm cream */
  --paper-2: #ECE8DC;
  --line: rgba(10,13,17,0.10);
  --line-2: rgba(10,13,17,0.06);
  --muted: rgba(10,13,17,0.55);
  --muted-2: rgba(10,13,17,0.40);
  /* accent (Onest) */
  --green: #4FA855;            /* slightly muted vs raw #99EC72 for editorial */
  --green-soft: #DCEFD2;
  --yellow: #E8C547;
  --yellow-soft: #FBF1C9;
  --red: #D14545;
  --red-soft: #F5D6D2;
  --accent: var(--green);
  /* typography */
  --serif: "Source Serif 4", "Source Serif Pro", "Tiempos Text", Georgia, serif;
  --sans:  "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono:  "JetBrains Mono", "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

[data-theme="dark"] {
  --ink: #ECE8DC;
  --ink-2: #C9C5BA;
  --paper: #0A0D11;
  --paper-2: #14181E;
  --line: rgba(236,232,220,0.12);
  --line-2: rgba(236,232,220,0.06);
  --muted: rgba(236,232,220,0.55);
  --muted-2: rgba(236,232,220,0.40);
  --green: #99EC72;
  --green-soft: rgba(153,236,114,0.14);
  --yellow: #FFF478;
  --yellow-soft: rgba(255,244,120,0.14);
  --red: #FF6E6E;
  --red-soft: rgba(255,60,70,0.14);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: #2B2E33;
  font-family: var(--sans);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
}

/* === EMAIL CLIENT FRAME === */
.client {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #1F2226;
}

.client-bar {
  height: 44px;
  background: #2B2E33;
  border-bottom: 1px solid #15171A;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  color: #C9C5BA;
  font-size: 12px;
  flex-shrink: 0;
}
.client-bar .lights { display: flex; gap: 6px; }
.client-bar .lights span { width: 11px; height: 11px; border-radius: 50%; background: #555; }
.client-bar .lights span:nth-child(1) { background: #FF5F57; }
.client-bar .lights span:nth-child(2) { background: #FEBC2E; }
.client-bar .lights span:nth-child(3) { background: #28C840; }
.client-bar .crumb { color: #8A8780; margin-left: 18px; font-family: var(--mono); font-size: 11px; }
.client-bar .grow { flex: 1; }
.client-bar .icon { width: 14px; height: 14px; opacity: 0.55; }

.client-toolbar {
  height: 38px;
  background: #25282D;
  border-bottom: 1px solid #15171A;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  font-size: 12px;
  color: #B5B1A7;
  flex-shrink: 0;
}
.client-toolbar .pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #8A8780;
}
.client-toolbar .from { color: #ECE8DC; font-weight: 600; }
.client-toolbar .subj { color: #C9C5BA; }

.client-stage {
  flex: 1;
  overflow: auto;
  padding: 24px 0;
  background: linear-gradient(180deg, #1F2226 0%, #15171A 100%);
}

/* === EMAIL BODY === */
.email {
  width: 680px;
  margin: 0 auto;
  background: var(--paper);
  color: var(--ink);
  position: relative;
  box-shadow: 0 24px 60px -20px rgba(0,0,0,0.6), 0 8px 20px -8px rgba(0,0,0,0.4);
}

/* === MASTHEAD === */
.masthead {
  padding: 32px 40px 24px;
  border-bottom: 1.5px solid var(--ink);
  position: relative;
}
.masthead .brand-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.masthead .brand-row .wcp-mark {
  height: 18px;
  width: auto;
  display: block;
  filter: invert(1) brightness(0);
  flex-shrink: 0;
}
.masthead .brand-row .divider {
  width: 1px;
  height: 16px;
  background: var(--line);
}
.masthead .brand-row .label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
}
[data-theme="dark"] .masthead .brand-row .wcp-mark { filter: none; }
.masthead .topline {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
}
.masthead .logo {
  font-family: var(--serif);
  font-size: 56px;
  font-weight: 600;
  letter-spacing: -0.025em;
  line-height: 0.95;
  color: var(--ink);
  margin: 0;
  font-style: italic;
}
.masthead .logo .wcp-mark {
  height: 38px;
  width: auto;
  display: inline-block;
  vertical-align: -2px;
  margin-right: 16px;
}
[data-theme="light"] .masthead .logo .wcp-mark {
  filter: invert(1) brightness(0);
}
.masthead .logo .amp {
  color: var(--accent);
  font-style: normal;
}
.masthead .tagline {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
}
.masthead .tagline .tt { color: var(--ink); font-weight: 500; }

/* MASTHEAD VARIANT: condensed all-caps */
.masthead[data-style="condensed"] .logo {
  font-family: var(--sans);
  font-style: normal;
  font-weight: 800;
  letter-spacing: -0.02em;
  font-size: 48px;
  text-transform: uppercase;
  font-stretch: condensed;
}
.masthead[data-style="stencil"] .logo {
  font-family: var(--mono);
  font-style: normal;
  font-weight: 700;
  font-size: 38px;
  letter-spacing: -0.01em;
  text-transform: uppercase;
}
.masthead[data-style="stencil"] .logo .amp {
  background: var(--accent);
  color: var(--paper);
  padding: 0 8px;
}

/* === SECTION WRAPPER === */
.section {
  padding: 28px 40px;
  border-bottom: 1px solid var(--line);
}
.section:last-child { border-bottom: 0; }
.section.tight { padding: 18px 40px; }

.eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
  font-weight: 600;
  margin-bottom: 4px;
}
.eyebrow .num {
  width: 22px; height: 22px;
  background: var(--ink);
  color: var(--paper);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  border-radius: 2px;
}
.eyebrow .rule { flex: 1; height: 1px; background: var(--line); }
.eyebrow .meta { color: var(--muted); font-weight: 500; }

.section-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin: 8px 0 16px;
  line-height: 1.1;
}
.section-title em { font-style: italic; color: var(--muted); font-weight: 400; }

/* === BRIEF (editor's note) === */
.brief-note {
  font-family: var(--serif);
  font-size: 19px;
  line-height: 1.55;
  letter-spacing: -0.01em;
  color: var(--ink);
  text-wrap: pretty;
}
.brief-note .drop {
  font-weight: 700;
  font-size: 56px;
  float: left;
  line-height: 0.85;
  margin: 6px 8px -4px 0;
  font-family: var(--serif);
  color: var(--ink);
}
.brief-byline {
  margin-top: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
}
.brief-byline .sig { color: var(--ink); font-weight: 600; }

/* === PULSE METRICS === */
.pulse {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border: 1px solid var(--line);
  background: var(--paper);
}
.pulse-cell {
  padding: 14px 14px 12px;
  border-right: 1px solid var(--line);
  position: relative;
}
.pulse-cell:last-child { border-right: 0; }
.pulse-cell .label {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 6px;
}
.pulse-cell .v {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
}
.pulse-cell .delta {
  font-family: var(--mono);
  font-size: 11px;
  margin-top: 5px;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.delta.up    { color: var(--green); }
.delta.down  { color: var(--red); }
.delta.flat  { color: var(--muted); }

/* === COMPETITOR CARDS === */
.comp-list {
  display: flex;
  flex-direction: column;
}
.comp-row {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 14px;
  padding: 14px 0;
  border-top: 1px solid var(--line);
  align-items: flex-start;
}
.comp-row:first-child { border-top: 0; padding-top: 4px; }
.comp-row:last-child { padding-bottom: 4px; }
.comp-mono {
  width: 44px; height: 44px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-family: var(--serif);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  position: relative;
  flex-shrink: 0;
}
.comp-mono .nash {
  position: absolute;
  bottom: -4px; right: -4px;
  width: 14px; height: 14px;
  background: var(--accent);
  border: 2px solid var(--paper);
  border-radius: 50%;
}
.comp-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 3px;
}
.comp-meta .firm { color: var(--ink); font-weight: 700; letter-spacing: 0.04em; }
.comp-meta .dot { width: 3px; height: 3px; background: var(--muted); border-radius: 50%; }
.comp-meta .tag {
  padding: 1.5px 6px;
  border-radius: 2px;
  font-size: 9.5px;
  font-weight: 700;
}
.tag.green { background: var(--green-soft); color: #1F5F2E; }
.tag.yellow { background: var(--yellow-soft); color: #6B5108; }
.tag.red { background: var(--red-soft); color: #6B1212; }
[data-theme="dark"] .tag.green { color: var(--green); }
[data-theme="dark"] .tag.yellow { color: var(--yellow); }
[data-theme="dark"] .tag.red { color: var(--red); }
.comp-meta .comp-tag-grey {
  padding: 1.5px 6px;
  border-radius: 2px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  background: var(--line);
  color: var(--muted);
}
[data-theme="dark"] .comp-meta .comp-tag-grey { color: var(--ink-2); }

.comp-headline {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.25;
  margin: 0 0 4px;
  color: var(--ink);
}
.comp-headline a { color: inherit; text-decoration: none; background-image: linear-gradient(var(--accent), var(--accent)); background-size: 100% 1px; background-repeat: no-repeat; background-position: 0 100%; padding-bottom: 1px; }
.comp-headline a:hover { background-size: 100% 2px; }
.comp-source {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-top: 4px;
}
.comp-source a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
.comp-source a:hover { color: var(--accent); border-bottom-color: var(--accent); }
.comp-source .arrow { font-family: var(--sans); margin-left: 2px; }
.comp-meta .firm a { color: inherit; text-decoration: none; }
.comp-meta .firm a:hover { color: var(--accent); }

/* Generic link styling for tables & lists */
.ma-table a.target-link { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
.ma-table a.target-link:hover { color: var(--accent); border-bottom-color: var(--accent); }
.ma-table a.src-link {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-decoration: none;
  border: 1px solid var(--line);
  padding: 1px 5px;
  display: inline-block;
}
.ma-table a.src-link:hover { color: var(--accent); border-color: var(--accent); }

.news-row h4 a { color: inherit; text-decoration: none; background-image: linear-gradient(var(--accent), var(--accent)); background-size: 100% 1px; background-repeat: no-repeat; background-position: 0 100%; padding-bottom: 1px; }
.news-row h4 a:hover { background-size: 100% 2px; }
.news-row .src a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); }
.news-row .src a:hover { color: var(--accent); border-bottom-color: var(--accent); }

.policy-row h5 a { color: inherit; text-decoration: none; background-image: linear-gradient(var(--accent), var(--accent)); background-size: 100% 1px; background-repeat: no-repeat; background-position: 0 100%; padding-bottom: 1px; }
.policy-row h5 a:hover { background-size: 100% 2px; }

.event-row .name a { color: inherit; text-decoration: none; }
.event-row .name a:hover { color: var(--accent); }

.fund-card a.firm-link { color: var(--muted); text-decoration: none; }
.fund-card a.firm-link:hover { color: var(--accent); }

.watch-card .firm a { color: inherit; text-decoration: none; }
.watch-card .firm a:hover { color: var(--accent); }
.comp-detail {
  font-size: 13px;
  line-height: 1.45;
  color: var(--muted);
}
.comp-date {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.05em;
  color: var(--muted);
  text-align: right;
  white-space: nowrap;
  padding-top: 2px;
}
.comp-date .num { color: var(--ink); font-weight: 600; display: block; font-size: 13px; }

/* compact mode */
.email[data-density="compact"] .comp-row { padding: 10px 0; }
.email[data-density="compact"] .section { padding: 22px 40px; }
.email[data-density="compact"] .comp-headline { font-size: 15px; }

/* === FUND CLOSES strip === */
.funds-strip {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 6px;
  margin-top: 18px;
}
.fund-card {
  border: 1px solid var(--line);
  padding: 10px;
  background: var(--paper);
  position: relative;
  min-width: 0;
  overflow-wrap: break-word;
}
.fund-card .firm {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fund-card .size {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
}
.fund-card .name {
  font-size: 11.5px;
  color: var(--ink);
  margin-top: 4px;
  line-height: 1.25;
}
.fund-card .note {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--muted);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.fund-card .accent {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 2px;
  background: var(--accent);
}

/* === M&A TABLE === */
.ma-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  margin-top: 8px;
}
.ma-table thead th {
  text-align: left;
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  padding: 8px 8px;
  border-bottom: 1px solid var(--ink);
  font-weight: 600;
}
.ma-table tbody td {
  padding: 9px 8px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}
.ma-table tbody tr:hover { background: var(--paper-2); }
.ma-table .target { font-weight: 600; color: var(--ink); }
.ma-table .sponsor { color: var(--muted); font-size: 11.5px; }
.ma-table .num { font-family: var(--mono); font-size: 11.5px; text-align: right; }
.ma-table .date { font-family: var(--mono); font-size: 10.5px; color: var(--muted); text-transform: uppercase; }
.ma-table .typ {
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 5px;
  border: 1px solid var(--line);
  display: inline-block;
}
.ma-table .typ.platform { border-color: var(--accent); color: var(--accent); background: var(--green-soft); }
.ma-table .typ.exit { border-color: var(--red); color: var(--red); background: var(--red-soft); }

/* === SECTOR HEATMAP === */
.heat {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  margin-top: 8px;
}
.heat-row {
  background: var(--paper);
  display: grid;
  grid-template-columns: 1fr 60px 80px 100px;
  align-items: center;
  padding: 8px 12px;
  gap: 12px;
  font-size: 12.5px;
}
.heat-row .name { font-weight: 500; }
.heat-row .deals { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; }
.heat-row .bar-wrap {
  height: 6px;
  background: var(--line-2);
  position: relative;
  border-radius: 1px;
}
.heat-row .bar {
  height: 100%;
  background: var(--ink);
  border-radius: 1px;
}
.heat-row.hot .bar { background: var(--accent); }
.heat-row .wow {
  font-family: var(--mono);
  font-size: 11px;
  text-align: right;
  font-weight: 600;
}
.heat-row .wow.up { color: var(--green); }
.heat-row .wow.dn { color: var(--red); }
.heat-row .wow.flat { color: var(--muted); }
.heat-row.hot .name::after {
  content: "● HOT";
  font-family: var(--mono);
  font-size: 8.5px;
  color: var(--accent);
  margin-left: 8px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

/* === SPARK === */
.spark-block {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
  padding: 16px;
  border: 1px solid var(--line);
  background: var(--paper);
}
.spark-block .label {
  font-family: var(--mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 6px;
}
.spark-block .val {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
}
.spark-block .sub {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 4px;
}

/* === NEWS LIST === */
.news-row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 16px;
  padding: 14px 0;
  border-top: 1px solid var(--line);

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

function initials(name) {
  return name.split(/\s+/).filter(Boolean).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function ThemeToggle() {
  const [theme, setTheme] = React.useState(
    typeof document !== 'undefined' ? (document.documentElement.getAttribute('data-theme') || 'dark') : 'dark'
  );
  const toggle = () => {
    const next = theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    setTheme(next);
  };
  return e('button', {
      className: 'theme-toggle',
      onClick: toggle,
      'aria-label': `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`,
      title: `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`,
    },
    e('span', { className: 'icon' }, theme === 'dark' ? '☀' : '☾'),
    e('span', null, theme === 'dark' ? 'Light' : 'Dark')
  );
}

function ViewportToggle() {
  const [viewport, setViewport] = React.useState(
    typeof document !== 'undefined' ? (document.documentElement.getAttribute('data-viewport') || 'desktop') : 'desktop'
  );
  const toggle = () => {
    const next = viewport === 'desktop' ? 'mobile' : 'desktop';
    document.documentElement.setAttribute('data-viewport', next);
    setViewport(next);
  };
  return e('button', {
      className: 'viewport-toggle',
      onClick: toggle,
      'aria-label': `Switch to ${viewport === 'desktop' ? 'mobile' : 'desktop'} preview`,
      title: `Switch to ${viewport === 'desktop' ? 'mobile' : 'desktop'} preview`,
    },
    e('span', { className: 'icon' }, viewport === 'desktop' ? '📱' : '🖥'),
    e('span', null, viewport === 'desktop' ? 'Mobile' : 'Desktop')
  );
}

// Format meta.sendDate (ISO) into the email-client crumb: "Mon · May 4, 2026 · 7:00 AM CT"
function formatSentCrumb(sendDate) {
  const dt = new Date(sendDate + 'T12:00:00'); // noon avoids TZ edge cases
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${days[dt.getDay()]} · ${months[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()} · 7:00 AM CT`;
}

function pluralize(n, singular, plural) {
  return n === 1 ? singular : (plural || singular + 's');
}

// "A" vs "An" based on the next word's starting sound. Simple vowel-letter
// check; handles the common case (active, eventful, intense, off, ugly) and
// gets a few edge cases wrong (e.g. "honest" should be "an" but starts with H).
// Override by writing the full phrase in briefDescriptor if it matters.
function articleFor(word) {
  if (!word) return 'A';
  return /^[aeiou]/i.test(word) ? 'An' : 'A';
}

function App() {
  const D = window.NEWSLETTER_DATA;

  const [tw, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "theme": "dark",
    "accent": "#4FA855",
    "density": "comfortable",
    "masthead": "serif"
  }/*EDITMODE-END*/);

  // Apply theme + accent
  useEffect(() => {
    const root = document.documentElement;
    root.dataset.theme = tw.theme;
    root.style.setProperty('--accent', tw.accent);
    if (tw.theme === 'dark') {
      // Soften paper-2 etc derived
    }
  }, [tw.theme, tw.accent]);

  // Auto-derive document.title from meta.issue so the browser-tab title
  // matches the rendered issue without a per-week edit to src/index.html
  // or the standalone build template.
  useEffect(() => {
    if (D && D.meta && D.meta.issue) {
      document.title = 'WCP Weekly · ' + D.meta.issue;
    }
  }, [D && D.meta && D.meta.issue]);

  return e('div', { className: 'client' },
    e(ClientChrome, null),
    e('div', { className: 'client-stage' },
      e('article', { className: 'email', 'data-density': tw.density },
        e(Masthead, { meta: D.meta, style: tw.masthead }),
        e(Brief, { brief: D.brief, meta: D.meta, competitors: D.competitors, funds: D.funds }),
        e(PulseSection, { pulse: D.pulse, spark: D.spark, funds: D.funds, meta: D.meta }),
        e(CompetitorSection, { competitors: D.competitors }),
        e(SectorSection, { sectors: D.sectors, meta: D.meta }),
        e(NewsSection, { news: D.news, portfolio: D.portfolio }),
        e(PolicySection, { policy: D.policy }),
        e(EventsSection, { events: D.events }),
        e(Footer, null),
      )
    ),
    e(TweaksUI, { tw, setTweak })
  );
}

function ClientChrome() {
  const meta = window.NEWSLETTER_DATA.meta;
  return e(React.Fragment, null,
    e('div', { className: 'client-bar' },
      e('div', { className: 'lights' }, e('span'), e('span'), e('span')),
      e('div', { className: 'crumb' }, 'Inbox — WCP Research'),
      e('div', { className: 'grow' }),
      e('div', { className: 'crumb' }, formatSentCrumb(meta.sendDate))
    ),
    e('div', { className: 'client-toolbar' },
      e('span', { className: 'pill' }, 'Reply'),
      e('span', { className: 'pill' }, 'Forward'),
      e('span', { className: 'pill' }, 'Archive'),
      e('div', { className: 'grow' }),
      e('span', null, e('span', { className: 'from' }, 'WCP Research'), ' · ', e('span', { className: 'subj' }, 'WCP Weekly · ' + meta.issue))
    )
  );
}

function Masthead({ meta, style }) {
  return e('header', { className: 'masthead', 'data-style': style, 'data-screen-label': 'Masthead' },
    e(ThemeToggle, null),
    e(ViewportToggle, null),
    e('div', { className: 'topline' },
      e('span', null, meta.issue),
      e('span', null, meta.edition),
      e('span', null, meta.week)
    ),
    e('h1', { className: 'logo' },
      e('a', { href: 'https://www.whistlercapital.com/', target: '_blank', rel: 'noopener', 'aria-label': 'Whistler Capital Partners' },
        e('img', { src: WCP_LOGO_SRC, alt: 'WCP', className: 'wcp-mark' })
      ),
      'WCP ', e('span', { className: 'amp' }, 'Weekly')
    ),
    e('div', { className: 'tagline' },
      e('span', { className: 'tt' }, 'Healthcare Private Equity · Nashville, TN'),
      e('span', null, 'Competitive Intel · M&A · Policy · Events')
    )
  );
}

function Brief({ brief, meta, competitors, funds }) {
  const compCount = (competitors || []).length;

function PulseSection({ pulse, spark, funds, meta }) {
  const max = Math.max(...spark);
  const min = Math.min(...spark);
  const w = 280, h = 60;
  const pts = spark.map((v, i) => {
    const x = (i / (spark.length - 1)) * w;
    const y = h - ((v - min) / (max - min)) * h;
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = path + ` L${w},${h} L0,${h} Z`;

  const fundCount = (funds || []).length;
  const sparkAvg = Math.round(spark.reduce((a, b) => a + b, 0) / spark.length);
  const window = (meta && meta.briefWindow) || '';

  return e('section', { className: 'section', 'data-screen-label': 'Pulse' },
    e('div', { className: 'eyebrow' },
      e('span', { className: 'num' }, '02'),
      e('span', null, 'The Pulse'),
      e('span', { className: 'rule' }),
      e('span', { className: 'meta' },
        window + ' · ' + fundCount + ' fund ' + pluralize(fundCount, 'close'))
    ),
    e('h2', { className: 'section-title' }, 'Healthcare PE, ', e('em', null, 'by the numbers')),
    e('div', { className: 'pulse' },
      e(PulseCell, { label: 'Deals Tracked', v: pulse.deals_wk.v, d: pulse.deals_wk.d, dir: pulse.deals_wk.dir }),
      e(PulseCell, { label: 'Capital Announced', v: pulse.avg_ev.v, d: pulse.avg_ev.d, dir: pulse.avg_ev.dir }),
      e(PulseCell, { label: 'Median Deal Size', v: pulse.median_mult.v, d: pulse.median_mult.d, dir: pulse.median_mult.dir }),
      e(PulseCell, { label: 'Fund Capital', v: pulse.fund_closes.v, d: pulse.fund_closes.d, dir: pulse.fund_closes.dir })
    ),
    e('div', { className: 'spark-block' },
      e('div', null,
        e('div', { className: 'label' }, '12-week deal volume'),
        e('div', { className: 'val' }, pulse.deals_wk.v + ' ', e('span', { style: { fontSize: 14, color: 'var(--muted)' } }, 'this wk')),
        e('div', { className: 'sub' }, 'Trailing 12-wk avg: ~' + sparkAvg)
      ),
      e('svg', { viewBox: `0 0 ${w} ${h}`, width: '100%', height: h, preserveAspectRatio: 'none' },
        e('path', { d: area, fill: 'var(--accent)', opacity: 0.12 }),
        e('path', { d: path, fill: 'none', stroke: 'var(--accent)', strokeWidth: 1.5 }),
        ...pts.map((p, i) =>
          e('circle', { key: i, cx: p[0], cy: p[1], r: i === pts.length - 1 ? 3 : 0, fill: 'var(--accent)' })
        )
      )
    ),
    funds && funds.length > 0 && e(CapitalFormation, { funds })
  );
}

function CapitalFormation({ funds }) {
  const count = funds.length;
  const single = count === 1;
  // 1 fund:  single horizontal card spanning the row
  // 2-4 funds: fill the row (each card 1/N width — wider, less wrapping)
  // 5+ funds: default 5-col grid (no override)
  const stripStyle = single
    ? { gridTemplateColumns: '1fr', gap: 0 }
    : count >= 2 && count <= 4
      ? { gridTemplateColumns: 'repeat(' + count + ', minmax(0, 1fr))' }
      : null;
  // Sum of dollar-denominated closes (everything that isn't a "Launch")
  const sumClosed = funds
    .filter(f => f.size && f.size !== 'Launch')
    .reduce((acc, f) => {
      const m = String(f.size).match(/\$([\d.]+)\s*([KMB])/i);
      if (!m) return acc;
      const n = parseFloat(m[1]);
      const mult = { K: 1e3, M: 1e6, B: 1e9 }[m[2].toUpperCase()] || 1;
      return acc + n * mult;
    }, 0);
  let sumLabel;
  if (sumClosed >= 1e9)      sumLabel = '$' + (sumClosed / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  else if (sumClosed >= 1e6) sumLabel = '$' + Math.round(sumClosed / 1e6) + 'M';
  else if (sumClosed > 0)    sumLabel = '$' + Math.round(sumClosed / 1e3) + 'K';
  else                       sumLabel = '$0';
  const launchCount = funds.filter(f => f.size === 'Launch').length;
  return e('div', { style: { marginTop: 24, paddingTop: 16, borderTop: '1px solid var(--line)' } },
    e('div', { className: 'eyebrow', style: { marginBottom: 0 } },
      e('span', null, 'Capital Formation'),
      e('span', { className: 'rule' }),
      e('span', { className: 'meta' },
        sumLabel + ' announced + ' + launchCount + ' ' + pluralize(launchCount, 'launch', 'launches'))
    ),
    e('div', { className: 'funds-strip', style: stripStyle },
      funds.map((f, i) =>
        e('div', {
          key: i,
          className: 'fund-card',
          style: single ? { display: 'grid', gridTemplateColumns: 'auto auto 1fr auto', alignItems: 'baseline', columnGap: 18, padding: '14px 16px' } : null,
        },
          e('div', { className: 'accent' }),
          e('div', { className: 'firm', style: single ? { whiteSpace: 'nowrap', marginBottom: 0 } : null },
            e('a', { className: 'firm-link', href: f.homeUrl || f.sourceUrl, target: '_blank', rel: 'noopener' }, f.firm)
          ),
          e('div', { className: 'size' },
            f.sourceUrl
              ? e('a', { className: 'firm-link', href: f.sourceUrl, target: '_blank', rel: 'noopener', style: { color: 'inherit', textDecoration: 'underline', textDecorationColor: 'var(--muted)' } }, f.size)
              : f.size
          ),
          e('div', { className: 'name', style: single ? { marginTop: 0 } : null }, f.fund),
          e('div', { className: 'note', style: single ? { marginTop: 0, textAlign: 'right' } : null }, f.date, ' · ', f.note)
        )
      )
    )
  );
}

function SectorSection({ sectors, meta }) {
  const [expanded, setExpanded] = React.useState(null);
  const maxDeals = Math.max(...sectors.map(s => s.deals));
  const totalThisWk = sectors.reduce((acc, s) => acc + (s.deals || 0), 0);
  const ytd = (meta && meta.ytd_deals) || totalThisWk;
  return e('section', { className: 'section', 'data-screen-label': 'Sectors' },
    e('div', { className: 'eyebrow' },
      e('span', { className: 'num' }, '04'),
      e('span', null, 'Sector Heatmap'),
      e('span', { className: 'rule' }),
      e('span', { className: 'meta' },
        totalThisWk.toLocaleString() + ' this wk · ' + ytd.toLocaleString() + ' YTD · click for detail')
    ),
    e('h2', { className: 'section-title' }, 'Where the ', e('em', null, 'capital is flowing')),
    e('div', { className: 'heat' },
      sectors.map((s, i) => {
        const hasWow = typeof s.wow === 'number';
        const dir = !hasWow ? 'flat' : s.wow > 0 ? 'up' : s.wow < 0 ? 'dn' : 'flat';
        const sign = hasWow && s.wow > 0 ? '+' : '';
        const isOpen = expanded === i;
        return e(React.Fragment, { key: i },
          e('div', {
              className: `heat-row ${s.hot ? 'hot' : ''} ${isOpen ? 'open' : ''}`,
              onClick: () => setExpanded(isOpen ? null : i),
              style: { cursor: 'pointer' },
              title: 'Click to view deals',
            },
            e('div', { className: 'name' },
              e('span', { style: { display: 'inline-block', width: 14, marginRight: 6, transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s', color: 'var(--muted)' } }, '▶'),
              s.name
            ),
            e('div', { className: 'deals' }, s.deals.toLocaleString()),
            e('div', { className: 'bar-wrap' },
              e('div', { className: 'bar', style: { width: `${(s.deals / maxDeals) * 100}%` } })
            ),
            e('div', { className: `wow ${dir}` }, hasWow ? (sign + s.wow + '% vs 4wk') : 'small base')
          ),
          isOpen && e('div', {
              className: 'heat-detail',
              style: {
                background: 'var(--paper-2)',
                borderLeft: '3px solid var(--accent)',
                margin: '4px 0 12px 0',
                padding: '12px 16px',
                fontSize: 13,
              },
            },
            e('table', { className: 'ma-table', style: { width: '100%', marginTop: 0 } },
              e('thead', null,
                e('tr', null,
                  e('th', null, 'Target'),
                  e('th', null, 'Buyer / Sponsor'),
                  e('th', { style: { textAlign: 'right' } }, 'EV'),
                  e('th', null, 'Note'),
                  e('th', null, 'Type'),
                  e('th', null, 'Date')
                )
              ),
              e('tbody', null,
                s.detail.map((d, j) =>
                  e('tr', { key: j },
                    e('td', { className: 'target' }, d.tgt),
                    e('td', { className: 'sponsor' }, d.buyer),
                    e('td', { className: 'num', style: { fontWeight: d.ev !== 'Undisc.' ? 600 : 400, color: d.ev !== 'Undisc.' ? 'inherit' : 'var(--muted)' } }, d.ev),
                    e('td', { className: 'sponsor', style: { fontStyle: 'italic', color: 'var(--muted)' } }, d.note || '—'),
                    e('td', null, e('span', { className: 'typ' }, d.type)),
                    e('td', { className: 'date' }, d.date)

}
